name = "stock-agent"
main = "src/index.ts"
compatibility_date = "2025-03-01"
compatibility_flags = ["nodejs_compat"]
account_id = "466788bf94b994a7922cbd15b834fe9b"

[[d1_databases]]
binding = "DB"
database_name = "stock-agent-db"
database_id = "ec67bd1d-5a79-49ed-990b-315a59215669"

[[kv_namespaces]]
binding = "CACHE"
id = "425ce93f0ab84e708013a64198298069"

# Single cron trigger — runs every 15 min, handles all jobs internally
[triggers]
crons = [
  "*/15 * * * *",
]

[vars]
ENVIRONMENT = "development"
